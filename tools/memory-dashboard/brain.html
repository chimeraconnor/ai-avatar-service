<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ana's Brain</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #08080f;
    --sidebar: #0e0e18;
    --panel:   #14142a;
    --border:  rgba(120,120,200,0.1);
    --accent:  #7b7fff;
    --text:    #b8b8d0;
    --dim:     #555570;
    --glow:    rgba(130,130,255,0.15);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px; overflow: hidden; }

  #app { display: flex; height: 100vh; }

  /* ── Sidebar ── */
  #sidebar {
    width: 300px; min-width: 260px; background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 10;
  }
  #sidebar-header {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { font-size: 24px; }
  .brand-name { font-size: 16px; font-weight: 700; color: #e0e0ff;
    letter-spacing: 0.02em; }
  .brand-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }
  #sidebar-body { flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 14px; }

  .section-label { font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--dim); margin-bottom: 6px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat { background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; }
  .stat-val { font-size: 20px; font-weight: 800; color: #e0e0ff; }
  .stat-lbl { font-size: 10px; color: var(--dim); margin-top: 1px; }

  /* History (date picker) */
  .history-nav { display: flex; align-items: center; gap: 6px; }
  .history-btn { background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px; color: var(--text); cursor: pointer;
    font-size: 14px; line-height: 1; transition: all 0.15s; }
  .history-btn:hover { border-color: var(--accent); background: rgba(123,127,255,0.1); }
  .history-btn:disabled { opacity: 0.25; cursor: default; }
  .history-btn:disabled:hover { border-color: var(--border); background: var(--panel); }
  .history-date { flex: 1; text-align: center; font-size: 13px;
    font-weight: 600; color: #e0e0ff; }
  .history-count { text-align: center; font-size: 10px; color: var(--dim);
    margin-top: 4px; }
  .history-latest { display: inline-block; background: var(--accent);
    color: #000; border-radius: 3px; padding: 1px 5px; font-size: 9px;
    font-weight: 700; margin-left: 6px; vertical-align: middle; }

  /* Search */
  #search { width: 100%; padding: 8px 10px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text);
    font-size: 12px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--dim); }

  /* Filters */
  .filter-row { display: flex; align-items: center; gap: 8px;
    padding: 4px 0; cursor: pointer; user-select: none; }
  .filter-row:hover { opacity: 0.9; }
  .filter-row input { accent-color: var(--accent); cursor: pointer; }
  .fdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .flbl { flex: 1; font-size: 12px; }
  .fcnt { font-size: 11px; color: var(--dim); }

  /* Cluster list */
  .cluster-list { max-height: 220px; overflow-y: auto; }
  .cluster-item { display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; border-radius: 4px; cursor: pointer;
    font-size: 11px; border: 1px solid transparent; }
  .cluster-item:hover { background: rgba(255,255,255,0.04); }
  .cluster-item.active { background: rgba(123,127,255,0.12);
    border-color: rgba(123,127,255,0.3); }
  .cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .clbl { flex: 1; color: var(--text); }
  .ccnt { color: var(--dim); font-size: 10px; }

  /* Inspector */
  #inspector { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; display: none; }
  #inspector.open { display: block; }
  .insp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .insp-badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; }
  .insp-cluster-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .insp-cluster-name { font-size: 10px; color: var(--dim); }
  .insp-summary { font-size: 13px; font-weight: 500; color: #e4e4ff;
    line-height: 1.5; margin-bottom: 6px; }
  .insp-meta { font-size: 11px; color: var(--dim); margin-bottom: 2px; }
  .insp-text { font-size: 11px; line-height: 1.6; color: var(--text);
    max-height: 200px; overflow-y: auto; border-top: 1px solid var(--border);
    padding-top: 8px; margin-top: 8px; white-space: pre-wrap; word-break: break-word; }
  .insp-text::-webkit-scrollbar { width: 4px; }
  .insp-text::-webkit-scrollbar-thumb { background: rgba(150,150,200,0.3); }
  .insp-close { float: right; background: none; border: none; color: var(--dim);
    cursor: pointer; font-size: 14px; padding: 0 4px; }
  .insp-close:hover { color: var(--text); }

  .gen-ts { font-size: 10px; color: var(--dim); text-align: center; padding-top: 8px; }

  /* ── 3D View ── */
  #brain { flex: 1; position: relative; background: var(--bg); }
  #brain canvas { display: block; }

  /* Controls overlay */
  #controls { position: absolute; top: 12px; right: 12px; z-index: 5;
    display: flex; gap: 6px; }
  .ctrl-btn { background: rgba(14,14,24,0.85); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; color: var(--text); cursor: pointer;
    font-size: 11px; backdrop-filter: blur(8px); }
  .ctrl-btn:hover { background: rgba(30,30,50,0.9); border-color: var(--accent); }
  .ctrl-btn.active { background: rgba(123,127,255,0.15); border-color: var(--accent); }

  /* Legend overlay */
  #legend { position: absolute; bottom: 16px; left: 16px; z-index: 5;
    background: rgba(14,14,24,0.85); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(8px); }
  #legend .section-label { margin-bottom: 4px; }
  .leg-row { display: flex; align-items: center; gap: 6px; font-size: 11px;
    padding: 2px 0; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Transition overlay */
  #transition-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(8,8,15,0.6); z-index: 3;
    pointer-events: none; opacity: 0;
    transition: opacity 0.25s ease;
  }
  #transition-overlay.active { opacity: 1; }

  /* scrollbars */
  #sidebar-body::-webkit-scrollbar, .cluster-list::-webkit-scrollbar { width: 4px; }
  #sidebar-body::-webkit-scrollbar-thumb, .cluster-list::-webkit-scrollbar-thumb {
    background: rgba(150,150,200,0.2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="brand">
        <span class="brand-icon">🧠</span>
        <div>
          <div class="brand-name">Ana's Brain</div>
          <div class="brand-sub">OpenClaw Knowledge Space</div>
        </div>
      </div>
    </div>
    <div id="sidebar-body">

      <!-- Stats -->
      <div>
        <div class="section-label">Overview</div>
        <div class="stats">
          <div class="stat"><div class="stat-val" id="s-nodes">—</div><div class="stat-lbl">Nodes</div></div>
          <div class="stat"><div class="stat-val" id="s-clusters">—</div><div class="stat-lbl">Clusters</div></div>
          <div class="stat"><div class="stat-val" id="s-edges">—</div><div class="stat-lbl">Edges</div></div>
          <div class="stat"><div class="stat-val" id="s-docs">—</div><div class="stat-lbl">Documents</div></div>
        </div>
      </div>

      <!-- History / timeline -->
      <div id="history-section">
        <div class="section-label">Timeline</div>
        <div class="history-nav">
          <button class="history-btn" id="hist-prev" title="Previous snapshot">&#9664;</button>
          <span class="history-date" id="hist-date">latest</span>
          <button class="history-btn" id="hist-next" title="Next snapshot">&#9654;</button>
        </div>
        <div class="history-count" id="hist-count"></div>
      </div>

      <!-- Search -->
      <div>
        <div class="section-label">Search</div>
        <input id="search" type="text" placeholder="Search memories..." autocomplete="off">
      </div>

      <!-- Source filters -->
      <div>
        <div class="section-label">Sources</div>
        <label class="filter-row"><input type="checkbox" data-src="lesson" checked>
          <span class="fdot" style="background:#FF6B6B"></span>
          <span class="flbl">Lessons</span><span class="fcnt" id="fc-lesson">0</span></label>
        <label class="filter-row"><input type="checkbox" data-src="identity" checked>
          <span class="fdot" style="background:#DDA0DD"></span>
          <span class="flbl">Identity</span><span class="fcnt" id="fc-identity">0</span></label>
        <label class="filter-row"><input type="checkbox" data-src="knowledge" checked>
          <span class="fdot" style="background:#96CEB4"></span>
          <span class="flbl">Knowledge</span><span class="fcnt" id="fc-knowledge">0</span></label>
        <label class="filter-row"><input type="checkbox" data-src="skill" checked>
          <span class="fdot" style="background:#FFEAA7"></span>
          <span class="flbl">Skills</span><span class="fcnt" id="fc-skill">0</span></label>
        <label class="filter-row"><input type="checkbox" data-src="daily" checked>
          <span class="fdot" style="background:#45B7D1"></span>
          <span class="flbl">Daily Notes</span><span class="fcnt" id="fc-daily">0</span></label>
        <label class="filter-row"><input type="checkbox" data-src="session" checked>
          <span class="fdot" style="background:#9B8EC7"></span>
          <span class="flbl">Sessions</span><span class="fcnt" id="fc-session">0</span></label>
      </div>

      <!-- Clusters -->
      <div>
        <div class="section-label">Clusters <span style="font-weight:400;color:var(--dim)">(click to focus)</span></div>
        <div class="cluster-list" id="cluster-list"></div>
      </div>

      <!-- Inspector -->
      <div id="inspector">
        <button class="insp-close" id="insp-close" title="Close">&times;</button>
        <div class="insp-header">
          <span class="insp-badge" id="insp-badge"></span>
          <span class="insp-cluster-dot" id="insp-cdot"></span>
          <span class="insp-cluster-name" id="insp-cname"></span>
        </div>
        <div class="insp-summary" id="insp-summary"></div>
        <div class="insp-meta" id="insp-file"></div>
        <div class="insp-meta" id="insp-date"></div>
        <div class="insp-text" id="insp-text"></div>
      </div>

      <div class="gen-ts" id="gen-ts"></div>
    </div>
  </div>

  <!-- ── 3D View ── -->
  <div id="brain">
    <div id="transition-overlay"></div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-reset" title="Reset camera">&#x27F2; Reset</button>
      <button class="ctrl-btn" id="btn-auto" title="Toggle auto-rotate">&#x21BB; Rotate</button>
    </div>
    <div id="legend">
      <div class="section-label">Source Types</div>
      <div class="leg-row"><span class="leg-dot" style="background:#FF6B6B;width:14px;height:14px"></span> Lesson</div>
      <div class="leg-row"><span class="leg-dot" style="background:#DDA0DD;width:12px;height:12px"></span> Identity</div>
      <div class="leg-row"><span class="leg-dot" style="background:#96CEB4;width:10px;height:10px"></span> Knowledge</div>
      <div class="leg-row"><span class="leg-dot" style="background:#FFEAA7;width:8px;height:8px"></span> Skill</div>
      <div class="leg-row"><span class="leg-dot" style="background:#45B7D1;width:8px;height:8px"></span> Daily</div>
      <div class="leg-row"><span class="leg-dot" style="background:#9B8EC7;width:5px;height:5px"></span> Session</div>
    </div>
  </div>

</div>

<!-- 3d-force-graph (Three.js wrapper) -->
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const SRC_COLOR = {
  lesson: '#FF6B6B', identity: '#DDA0DD', knowledge: '#96CEB4',
  skill: '#FFEAA7', daily: '#45B7D1', session: '#9B8EC7'
};
const SRC_SIZE = {
  lesson: 3.5, identity: 3.0, knowledge: 2.0,
  skill: 1.5, daily: 1.5, session: 0.6
};
const SRC_LABEL = {
  lesson: 'Lesson', identity: 'Identity', knowledge: 'Knowledge',
  skill: 'Skill', daily: 'Daily', session: 'Session'
};

// 36 distinct cluster colors
const PALETTE = [
  '#FF6B6B','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#F0E68C',
  '#20B2AA','#FF7F50','#87CEEB','#DA70D6','#32CD32','#FF69B4',
  '#00CED1','#FFD700','#7B68EE','#00FA9A','#FF4500','#1E90FF',
  '#FFA07A','#8FBC8F','#9370DB','#F08080','#66CDAA','#BA55D3',
  '#E6E6FA','#F5DEB3','#B0C4DE','#98FB98','#FFDAB9','#C0C0FF',
  '#87CEFA','#DEB887','#AFEEEE','#F4A460','#BC8F8F','#7EC8E3',
];

let DATA = null;
let graph = null;
let focusedCluster = null;
let autoRotate = false;
let searchQuery = '';
let srcFilter = {};
Object.keys(SRC_COLOR).forEach(k => { srcFilter[k] = true; });

let clusterMap = {};
let snapshots = [];      // sorted date strings
let currentSnapIdx = -1;
let transitioning = false;

// ─── Load data ───────────────────────────────────────────────────────────────
async function init() {
  DATA = await (await fetch('graph_data.json')).json();

  // Build snapshot timeline
  snapshots = (DATA.available_snapshots || []).sort();
  currentSnapIdx = snapshots.length - 1;
  updateHistoryUI();

  loadDataIntoUI(DATA);
  buildGraph(DATA);
}

function loadDataIntoUI(data) {
  clusterMap = {};
  data.clusters.forEach(c => { clusterMap[c.id] = c; });

  // Stats
  document.getElementById('s-nodes').textContent = data.stats.total_nodes;
  document.getElementById('s-clusters').textContent = data.stats.clusters;
  document.getElementById('s-edges').textContent = data.stats.edges;
  const docs = new Set(data.nodes.map(n => n.path));
  document.getElementById('s-docs').textContent = docs.size;
  document.getElementById('gen-ts').textContent = 'Generated ' + data.generated.slice(0, 16).replace('T', ' ');

  // Source counts
  const srcCounts = {};
  data.nodes.forEach(n => { srcCounts[n.source_type] = (srcCounts[n.source_type]||0) + 1; });
  Object.keys(SRC_COLOR).forEach(k => {
    const el = document.getElementById('fc-' + k);
    if (el) el.textContent = srcCounts[k] || 0;
  });

  buildClusterList(data);
}

// ─── History / Timeline ──────────────────────────────────────────────────────
function updateHistoryUI() {
  const dateEl = document.getElementById('hist-date');
  const countEl = document.getElementById('hist-count');
  const prevBtn = document.getElementById('hist-prev');
  const nextBtn = document.getElementById('hist-next');

  if (snapshots.length <= 1) {
    dateEl.innerHTML = snapshots[0] || 'today';
    countEl.textContent = snapshots.length + ' snapshot';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  const isLatest = currentSnapIdx === snapshots.length - 1;
  const date = snapshots[currentSnapIdx] || 'latest';
  dateEl.innerHTML = date + (isLatest ? '<span class="history-latest">LATEST</span>' : '');
  countEl.textContent = (currentSnapIdx + 1) + ' of ' + snapshots.length + ' snapshots';
  prevBtn.disabled = currentSnapIdx <= 0;
  nextBtn.disabled = isLatest;
}

async function loadSnapshot(idx) {
  if (idx < 0 || idx >= snapshots.length || transitioning) return;

  const date = snapshots[idx];
  const oldData = DATA;
  transitioning = true;

  // Show transition overlay
  const overlay = document.getElementById('transition-overlay');
  overlay.classList.add('active');

  try {
    // Fetch snapshot — latest is graph_data.json, older ones are in snapshots/
    const url = idx === snapshots.length - 1
      ? 'graph_data.json'
      : 'snapshots/' + date + '.json';
    const newData = await (await fetch(url)).json();

    currentSnapIdx = idx;
    updateHistoryUI();

    // Wait for overlay fade-in
    await sleep(250);

    // Identify entering / exiting nodes
    const oldIds = new Set((oldData ? oldData.nodes : []).map(n => n.id));
    const newIds = new Set(newData.nodes.map(n => n.id));
    const enterIds = new Set([...newIds].filter(id => !oldIds.has(id)));

    // Update data + UI
    DATA = newData;
    loadDataIntoUI(newData);

    // Rebuild graph data — entering nodes start tiny for pop-in
    const gData = {
      nodes: newData.nodes.map(n => ({
        ...n,
        fx: n.x, fy: n.y, fz: n.z,
        _scale: enterIds.has(n.id) ? 0.01 : 1,
      })),
      links: newData.edges.map(e => ({ source: e.source, target: e.target }))
    };

    graph.graphData(gData);

    // Remove overlay
    overlay.classList.remove('active');
    await sleep(50);

    // Animate new nodes popping in
    if (enterIds.size > 0) {
      animatePopIn(gData.nodes.filter(n => enterIds.has(n.id)));
    }

  } catch (err) {
    console.error('Failed to load snapshot:', err);
    overlay.classList.remove('active');
  }

  transitioning = false;
}

function animatePopIn(nodes) {
  const DURATION = 400;
  const start = performance.now();

  function tick(now) {
    const t = Math.min(1, (now - start) / DURATION);
    // Overshoot ease-out for a "pop" feel
    const ease = t < 0.7
      ? (t / 0.7) * 1.12
      : 1.12 - 0.12 * ((t - 0.7) / 0.3);
    const scale = Math.max(0.01, ease);

    nodes.forEach(n => { n._scale = scale; });
    // Trigger nodeVal re-evaluation
    graph.nodeVal(graph.nodeVal());

    if (t < 1) requestAnimationFrame(tick);
    else nodes.forEach(n => { n._scale = 1; });
  }
  requestAnimationFrame(tick);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

document.getElementById('hist-prev').addEventListener('click', () => {
  loadSnapshot(currentSnapIdx - 1);
});
document.getElementById('hist-next').addEventListener('click', () => {
  loadSnapshot(currentSnapIdx + 1);
});

// ─── Cluster list ────────────────────────────────────────────────────────────
function clusterColor(cid) {
  if (cid === -1) return '#555570';
  return PALETTE[cid % PALETTE.length];
}

function buildClusterList(data) {
  const el = document.getElementById('cluster-list');
  el.innerHTML = '';
  focusedCluster = null;
  const sorted = [...data.clusters].sort((a,b) => {
    if (a.id === -1) return 1;
    if (b.id === -1) return -1;
    return b.count - a.count;
  });
  sorted.forEach(c => {
    const div = document.createElement('div');
    div.className = 'cluster-item';
    div.dataset.cid = c.id;
    div.innerHTML = '<span class="cdot" style="background:' + clusterColor(c.id) + '"></span>'
      + '<span class="clbl">' + esc(c.label) + '</span>'
      + '<span class="ccnt">' + c.count + '</span>';
    div.addEventListener('click', () => toggleClusterFocus(c.id, div));
    el.appendChild(div);
  });
}

function toggleClusterFocus(cid, el) {
  if (focusedCluster === cid) {
    focusedCluster = null;
    document.querySelectorAll('.cluster-item').forEach(e => e.classList.remove('active'));
  } else {
    focusedCluster = cid;
    document.querySelectorAll('.cluster-item').forEach(e => e.classList.remove('active'));
    if (el) el.classList.add('active');
  }
  updateVisibility();
}

// ─── 3D Graph ────────────────────────────────────────────────────────────────
function buildGraph(data) {
  const container = document.getElementById('brain');

  graph = ForceGraph3D()(container)
    .backgroundColor('#08080f')
    .showNavInfo(false)
    // Disable forces — positions from UMAP
    .d3Force('charge', null)
    .d3Force('link', null)
    .d3Force('center', null)
    .warmupTicks(0)
    .cooldownTicks(0)
    .enableNodeDrag(false)
    // Nodes: size = source type base size * per-node scale (for animation)
    .nodeVal(n => (SRC_SIZE[n.source_type] || 1) * (n._scale || 1))
    .nodeColor(n => nodeColor(n))
    .nodeOpacity(0.88)
    .nodeResolution(16)
    // Edges
    .linkWidth(0.15)
    .linkOpacity(0.06)
    .linkColor(() => 'rgba(150,150,220,0.12)')
    // Interaction
    .onNodeClick(n => showInspector(n))
    .onNodeHover(n => {
      container.style.cursor = n ? 'pointer' : 'default';
    })
    // Tooltip
    .nodeLabel(n => {
      const summary = n.summary || n.title;
      const clr = clusterColor(n.cluster);
      const cname = clusterMap[n.cluster] ? clusterMap[n.cluster].label : 'unclustered';
      const srcClr = SRC_COLOR[n.source_type] || '#888';
      return '<div style="background:rgba(10,10,20,0.94);padding:6px 10px;border-radius:6px;'
        + 'font-size:11px;color:#d0d0e8;max-width:300px;border:1px solid ' + clr + '40;'
        + 'line-height:1.5">'
        + '<div style="color:' + clr + ';font-size:10px;font-weight:600;margin-bottom:3px">' + esc(cname) + '</div>'
        + '<div>' + esc(summary.slice(0,120)) + '</div>'
        + '<div style="color:#666;font-size:10px;margin-top:4px">'
        + '<span style="color:' + srcClr + '">' + (SRC_LABEL[n.source_type] || n.source_type) + '</span>'
        + ' &middot; ' + (n.date || '')
        + '</div></div>';
    });

  // Set data with fixed UMAP positions
  var gData = {
    nodes: data.nodes.map(n => ({
      ...n,
      fx: n.x, fy: n.y, fz: n.z,
      _scale: 1,
    })),
    links: data.edges.map(e => ({ source: e.source, target: e.target }))
  };

  graph.graphData(gData);

  // Camera
  setTimeout(function() {
    graph.cameraPosition({ x: 180, y: 120, z: 180 }, { x: 0, y: 0, z: 0 }, 1200);
  }, 100);
}

function nodeColor(n) {
  // Search filtering
  if (searchQuery) {
    var match = (n.summary || '').toLowerCase().includes(searchQuery) ||
                  n.title.toLowerCase().includes(searchQuery) ||
                  (n.text || '').toLowerCase().includes(searchQuery);
    if (!match) return 'rgba(30,30,50,0.15)';
  }
  // Cluster focus
  if (focusedCluster !== null && n.cluster !== focusedCluster) {
    return 'rgba(30,30,50,0.12)';
  }
  // Source filter
  if (!srcFilter[n.source_type]) return 'rgba(30,30,50,0.08)';

  // Nodes still scaling in glow with their source color
  if (n._scale != null && n._scale < 0.8) {
    return SRC_COLOR[n.source_type] || '#888';
  }

  // Color by cluster
  return clusterColor(n.cluster);
}

function updateVisibility() {
  if (!graph) return;
  graph.nodeColor(graph.nodeColor());
  graph.linkOpacity(focusedCluster !== null ? 0.02 : 0.06);
}

// ─── Controls ────────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', function() {
  graph.cameraPosition({ x: 180, y: 120, z: 180 }, { x: 0, y: 0, z: 0 }, 800);
});

document.getElementById('btn-auto').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.classList.toggle('active', autoRotate);
  if (autoRotate) startAutoRotate();
});

var rotAngle = 0;
function startAutoRotate() {
  if (!autoRotate) return;
  rotAngle += 0.003;
  var dist = 220;
  graph.cameraPosition({
    x: dist * Math.cos(rotAngle),
    y: 80 + 40 * Math.sin(rotAngle * 0.3),
    z: dist * Math.sin(rotAngle),
  });
  requestAnimationFrame(startAutoRotate);
}

// ─── Search ──────────────────────────────────────────────────────────────────
var searchTimer;
document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    searchQuery = e.target.value.trim().toLowerCase();
    updateVisibility();
  }, 200);
});

// ─── Source filters ──────────────────────────────────────────────────────────
document.querySelectorAll('.filter-row input').forEach(function(cb) {
  cb.addEventListener('change', function() {
    srcFilter[cb.dataset.src] = cb.checked;
    updateVisibility();
  });
});

// ─── Inspector ───────────────────────────────────────────────────────────────
function showInspector(n) {
  var panel = document.getElementById('inspector');
  var srcClr = SRC_COLOR[n.source_type] || '#888';
  var cclr = clusterColor(n.cluster);
  var cname = clusterMap[n.cluster] ? clusterMap[n.cluster].label : 'unclustered';

  var badge = document.getElementById('insp-badge');
  badge.textContent = SRC_LABEL[n.source_type] || n.source_type;
  badge.style.background = srcClr + '22';
  badge.style.color = srcClr;

  document.getElementById('insp-cdot').style.background = cclr;
  document.getElementById('insp-cname').textContent = cname;
  document.getElementById('insp-summary').textContent = n.summary || n.title;
  document.getElementById('insp-file').textContent = '\u{1F4C1} ' + n.path;
  document.getElementById('insp-date').textContent = '\u{1F4C5} ' + (n.date || 'n/a');
  document.getElementById('insp-text').textContent = n.text || '(no content)';
  panel.classList.add('open');
}

document.getElementById('insp-close').addEventListener('click', function() {
  document.getElementById('inspector').classList.remove('open');
});

function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── Go ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
